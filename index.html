<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sensory Journey</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Game canvas is injected here by p5.js -->
  <div id="game-container"></div>

  <!-- Status message shown while assets load -->
  <div id="loading-screen">
    <div class="load-inner">
      <p class="load-title">SENSORY JOURNEY</p>
      <p class="load-sub">Loading assets…</p>
    </div>
  </div>

  <!--
    p5.js – local copy goes in libraries/p5.min.js
    Download from: https://p5js.org/download/
    Until then, CDN fallback is used automatically.
  -->
  <script src="libraries/p5.min.js" onerror="
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js';
    document.head.appendChild(s);
  "></script>

  <!-- Game modules (order matters) -->
  <script src="levels.js"></script>
  <script src="tilemap.js"></script>
  <script src="player.js"></script>
  <script src="dialogue.js"></script>
  <script src="ui.js"></script>
  <script src="sketch.js"></script>

  <!-- Hide loading screen once p5 canvas is created -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        if (ls) ls.style.opacity = '0';
        setTimeout(() => { if (ls) ls.remove(); }, 600);
      }, 400);
    });
  </script>

</body>
</html>
